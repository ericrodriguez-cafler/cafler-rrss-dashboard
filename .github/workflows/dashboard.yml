name: Cafler · Dashboard RRSS

# Se ejecuta cada lunes a las 07:00 UTC (09:00 Madrid) y también a mano.
on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Evita solapamientos si un run tarda
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generar dashboard.html
        env:
          META_TOKEN: ${{ secrets.META_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          DASHBOARD_OUT: public/index.html
        run: |
          mkdir -p public
          python cafler_dashboard.py
          echo "Tamaño del HTML generado:"
          wc -c public/index.html

      - name: Aviso a Slack con resumen (webhook)
        if: ${{ success() }}
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then echo "Sin SLACK_WEBHOOK_URL; me salto el aviso."; exit 0; fi
          python - <<'PY'
          import json, os, urllib.request, urllib.error
          s = json.load(open("public/summary.json", encoding="utf-8"))
          url = "https://ericrodriguez-cafler.github.io/cafler-rrss-dashboard/"
          L = ["✦ *Resumen semanal · Redes sociales Cafler*"]
          nf = s.get("new_followers")
          tf = s.get("total_followers", 0)
          foll = ("%+d seguidores nuevos" % nf) if isinstance(nf, int) else ("%d seguidores (base inicial)" % tf)
          L.append("\U0001F4CA Esta semana: %s publicaciones · %s interacciones · %s" % (
              s.get("week_posts", 0), s.get("week_interactions", 0), foll))
          tp = s.get("top_post")
          if tp:
              L.append("\U0001F3C6 Top post: %s — %s de alcance → %s" % (tp["account"], tp["reach"], tp["permalink"]))
          L.append("\U0001F517 Dashboard completo: %s" % url)
          body = json.dumps({"text": "\n".join(L)}).encode("utf-8")
          req = urllib.request.Request(os.environ["SLACK_WEBHOOK_URL"], data=body, headers={"Content-Type": "application/json"})
          try:
              r = urllib.request.urlopen(req, timeout=30)
              print("Aviso Slack enviado. HTTP", r.status)
          except urllib.error.HTTPError as e:
              print("FALLO webhook Slack: HTTP", e.code)
              print(e.read().decode("utf-8", "replace")[:300])
          PY

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
